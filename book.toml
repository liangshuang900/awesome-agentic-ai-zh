[book]
title = "awesome-agentic-ai-zh"
description = "AI Agent 學習地圖 — 從第一行 LLM API 到自己打造多 agent 系統"
authors = ["Wenyu Chiou"]
language = "zh-TW"
multilingual = false
src = "book/src"

[output.html]
default-theme = "light"
preferred-dark-theme = "navy"
git-repository-url = "https://github.com/WenyuChiou/awesome-agentic-ai-zh"
edit-url-template = "https://github.com/WenyuChiou/awesome-agentic-ai-zh/edit/main/{path}"
site-url = "/awesome-agentic-ai-zh/"
# Mermaid JS 注入（mdbook-mermaid 在第一次 install 時生成這兩個檔案）
additional-js = ["mermaid.min.js", "mermaid-init.js"]

[output.html.search]
enable = true
limit-results = 30
use-boolean-and = true
boost-title = 2
boost-hierarchy = 2
boost-paragraph = 1
expand = true

[output.html.fold]
enable = true
level = 1

# Mermaid 支援（mdbook-mermaid preprocessor）
# 安裝：cargo install mdbook-mermaid  然後 mdbook-mermaid install
[preprocessor.mermaid]
command = "mdbook-mermaid"

[build]
build-dir = "book/dist"
